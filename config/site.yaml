version: "1.0"

translation:
  target_language: zh

homepage:
  recommendation_count: 12
  criteria: >-
    首页推荐从四个维度综合判断，按 1–5 分打分。
    重要性：对行业、市场或公共议题具有标志性意义，值得被记录；
    影响力：可能改变技术路线、商业格局、政策方向或社会认知；
    持续性：不是昙花一现，未来数天到数周内仍会被讨论和跟踪；
    实用性：对目标读者有参考或行动价值，能帮助他们做判断、理解趋势或做出决策。
    同时兼顾不同分类的覆盖度，避免同类主题过度集中。
    5 分是首页必推的里程碑事件，对行业、市场或公共议题具有标志性意义，未来数天到数周仍会被讨论，对读者决策或认知有实质价值；
    4 分是强推荐，至少在重要性、影响力、持续性、实用性中的两项表现突出；
    3 分是可推荐，有价值但偏常规，适合作为首页补充或分类页头部；
    2 分是边缘或短暂热点，热度低、影响面小、持续性差，基本只适合做来源页；
    1 分是不推荐，内容质量差、过于私人/本地，或与日报定位无关。

categories:
  - id: ai
    name: AI
    order: 1
    definition: 人工智能模型、论文、产品、开源项目、行业争议及 AI 基础设施。

  - id: tech
    name: 科技
    order: 2
    definition: 广义科技、软硬件、开发者工具、芯片、网络安全、量子计算等，且核心不是 AI。

  - id: business
    name: 商业
    order: 3
    definition: 企业财报、并购、市场波动、商业模式、消费品牌争议。

  - id: policy
    name: 政策
    order: 4
    definition: 政府法规、官方政策、监管、教育招生政策。

  - id: society
    name: 社会
    order: 5
    definition: 社会民生、公共安全、教育情绪、社会热点、灾害事故。

  - id: health
    name: 健康
    order: 6
    definition: 医疗、公共卫生、健康。

  - id: entertainment
    name: 娱乐
    order: 7
    definition: 娱乐、体育、影视、明星、游戏、文化。

  - id: geopolitics
    name: 地缘
    order: 8
    definition: 国际关系、地缘冲突、外交、军事、跨境争端。

  - id: lifestyle
    name: 生活
    order: 9
    definition: 生活消费、美食、旅行、住房、日常技巧。

  - id: other
    name: 其他
    order: 10
    definition: 明显不属于以上任何一类，或无法判断主题的内容。

feeds:
  - id: ai
    title: AI 动态
    criteria: >-
      AI 动态聚焦人工智能领域的最新模型发布、开源项目、产品更新、研究论文与行业争议，
      优先选择对读者有参考价值、可能引发后续讨论或具有应用落地潜力的内容，按 1–5 分评估。
      5 分是核心 AI 动态，如大模型/重要开源项目/标志性产品发布/顶级论文，对行业有范式影响；
      4 分是重要 AI 内容，值得 AI 读者关注的新模型、项目、产品或争议；
      3 分是普通 AI 相关，AI 只是配角，或影响有限的小更新；
      2 分是弱相关，标题带 AI 但实质关系不大，或非 AI 技术内容；
      1 分是不相关，与 AI 无关。

  - id: politics-economy
    title: 政经观察
    criteria: >-
      政经观察聚焦宏观经济、政策变化、国际关系与重大社会议题，
      优先选择与中国市场或全球格局密切相关、具有长期参考价值的内容，按 1–5 分评估。
      5 分是重大政经/地缘事件，如政策转向、国际冲突升级、重要经济数据或市场动荡，对中国或全球格局影响深远；
      4 分是重要政经动态，值得关注的政策、国际关系或经济事件；
      3 分是普通相关，社会议题带有政策/经济背景，但影响有限；
      2 分是弱相关，娱乐/体育/科技新闻中附带一点政经元素；
      1 分是不相关，与政经无关。
